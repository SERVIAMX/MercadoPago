<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <title>Pago con tarjeta — Mercado Pago Checkout API</title>
  <style>
    body { font-family: sans-serif; max-width: 480px; margin: 40px auto; padding: 0 20px; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
    /* Contenedores de iframes de MP */
    #form-checkout__cardNumber,
    #form-checkout__expirationDate,
    #form-checkout__securityCode {
      border: 1px solid #ccc;
      border-radius: 6px;
      height: 48px;
      box-sizing: border-box;
      position: relative;
    }
    /* El iframe que inyecta MP */
    #form-checkout__cardNumber iframe,
    #form-checkout__expirationDate iframe,
    #form-checkout__securityCode iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100% !important;
      height: 100% !important;
      border: none;
      pointer-events: auto;
    }
    input, select { width: 100%; border: 1px solid #ccc; border-radius: 6px; height: 40px; padding: 0 8px; box-sizing: border-box; }
    input:disabled { background: #f5f5f5; color: #333; cursor: not-allowed; font-weight: 600; }
    button { width: 100%; background: #009EE3; color: #fff; border: none; border-radius: 6px; height: 44px; font-size: 16px; cursor: pointer; }
    button:disabled { opacity: 0.6; cursor: not-allowed; }
    #result { margin-top: 20px; padding: 12px; border-radius: 6px; display: none; }
    #result.approved { background: #d4edda; color: #155724; }
    #result.rejected { background: #f8d7da; color: #721c24; }
    #result.pending  { background: #fff3cd; color: #856404; }
    #result.error    { background: #f8d7da; color: #721c24; }

    .field-error { margin-top: 6px; font-size: 12px; color: #b3261e; display: none; line-height: 1.35; }
    .label-invalid { color: #b3261e !important; }
    .mp-field-invalid,
    input.mp-field-invalid,
    select.mp-field-invalid {
      border-color: #b3261e !important;
      box-shadow: 0 0 0 3px rgba(179, 38, 30, 0.12);
    }
  </style>
</head>
<body>

  <h2>Pago con tarjeta</h2>

  <form id="form-checkout">

    <div class="form-group">
      <label>Monto a pagar (MXN)</label>
      <input type="number" id="payment-amount" placeholder="0.00" min="1" step="0.01" required />
    </div>

    <div class="form-group">
      <label>Número de tarjeta</label>
      <!-- MP monta un iframe seguro aquí -->
      <div id="form-checkout__cardNumber"></div>
      <div class="field-error" id="error-cardNumber"></div>
    </div>

    <div style="display:flex; gap:12px;">
      <div class="form-group" style="flex:1">
        <label>Vencimiento</label>
        <div id="form-checkout__expirationDate"></div>
        <div class="field-error" id="error-expirationDate"></div>
      </div>
      <div class="form-group" style="flex:1">
        <label>CVV</label>
        <div id="form-checkout__securityCode"></div>
        <div class="field-error" id="error-securityCode"></div>
      </div>
    </div>

    <div class="form-group">
      <label>Nombre en la tarjeta</label>
      <input type="text" id="form-checkout__cardholderName" placeholder="Como aparece en la tarjeta" />
      <div class="field-error" id="error-cardholderName"></div>
    </div>

    <div class="form-group">
      <label>Email del comprador</label>
      <input type="email" id="form-checkout__cardholderEmail" placeholder="correo@ejemplo.com" />
      <div class="field-error" id="error-cardholderEmail"></div>
    </div>

    <div class="form-group">
      <label>Banco emisor</label>
      <select id="form-checkout__issuer"></select>
    </div>

    <!-- Identificación opcional en México — descomenta si la necesitas
    <div style="display:flex; gap:12px;">
      <div class="form-group" style="flex:1">
        <label>Tipo de identificación</label>
        <select id="form-checkout__identificationType"></select>
      </div>
      <div class="form-group" style="flex:1">
        <label>Número (RFC / CURP)</label>
        <input type="text" id="form-checkout__identificationNumber" placeholder="XAXX010101000" />
      </div>
    </div>
    -->

    <!-- Requerido por MP aunque no se muestre — fijo en 1 (sin mensualidades) -->
    <select id="form-checkout__installments" style="display:none;"></select>

    <!-- ID del cliente — normalmente viene del JWT/sesión, no del formulario -->
    <input type="hidden" id="client-id" value="" />

    <button type="submit" id="form-checkout__submit">Pagar $150.00 MXN</button>
  </form>

  <div id="result"></div>

  <!-- SDK de Mercado Pago v2 -->
  <script src="https://sdk.mercadopago.com/js/v2"></script>
  <script>
    // Leer parámetros que Flutter pasa por URL
    const params          = new URLSearchParams(window.location.search);
    const clientId        = params.get('clientId') || document.getElementById('client-id').value;
    const extRef          = params.get('ref')      || ('orden-' + Date.now());
    const amount          = params.get('amount');
    const idHistoryBalance = params.get('idHistoryBalance') || null;

    console.log('URL completa:', window.location.href);
    console.log('Params → clientId:', clientId, '| ref:', extRef, '| amount:', amount, '| idHistoryBalance:', idHistoryBalance);

    // Setear monto desde URL — disabled para que no se pueda editar
    const amountInput = document.getElementById('payment-amount');
    if (amount && parseFloat(amount) > 0) {
      amountInput.value    = parseFloat(amount).toFixed(2);
      amountInput.disabled = true;
      document.getElementById('form-checkout__submit').textContent =
        `Pagar $${parseFloat(amount).toFixed(2)} MXN`;
    }

    // 1. Inicializar con tu PUBLIC KEY
    const mp = new MercadoPago('APP_USR-ff429938-4c7a-47c1-b882-674d04234f1e', { locale: 'es-MX' });
    // 2. Montar el CardForm — MP inyecta iframes seguros en los divs declarados
    const FIELD_CONTAINER_ID = {
      cardNumber: 'form-checkout__cardNumber',
      expirationDate: 'form-checkout__expirationDate',
      securityCode: 'form-checkout__securityCode',
      cardholderName: 'form-checkout__cardholderName',
      cardholderEmail: 'form-checkout__cardholderEmail',
      issuer: 'form-checkout__issuer',
      installments: 'form-checkout__installments',
    };

    const FIELD_LABELS = {
      cardNumber: 'número de tarjeta',
      expirationDate: 'fecha de vencimiento',
      securityCode: 'CVV',
      cardholderName: 'nombre en la tarjeta',
      cardholderEmail: 'email',
      issuer: 'banco emisor',
    };

    let expectedCvvLength = 3;

    function normalizeMpErrors(error) {
      if (!error) return [];
      if (Array.isArray(error)) {
        return error.map((e) => ({
          code: e.code || e.cause,
          message: e.message,
        }));
      }
      if (Array.isArray(error.errorMessages)) {
        return error.errorMessages.map((e) => ({
          code: e.cause || e.code,
          message: e.message,
        }));
      }
      if (error.message || error.code || error.cause || error.error) {
        return [{
          code: error.code || error.cause,
          message: error.message || error.error || String(error.cause || ''),
        }];
      }
      return [];
    }

    function translateMpError(code, field, fallbackMessage) {
      const label = FIELD_LABELS[field] || field;

      const byCode = {
        invalid_length: () => {
          if (field === 'securityCode') {
            return expectedCvvLength === 4
              ? 'El CVV de American Express debe tener 4 dígitos.'
              : 'El CVV debe tener 3 dígitos.';
          }
          if (field === 'cardNumber') return 'El número de tarjeta no tiene la cantidad de dígitos correcta.';
          return `Revisa la longitud del campo ${label}.`;
        },
        invalid_type: () => {
          if (field === 'securityCode' || field === 'cardNumber') {
            return `El campo ${label} solo debe contener números.`;
          }
          return `El formato del campo ${label} no es válido.`;
        },
        invalid_value: () => {
          if (field === 'expirationDate') return 'La fecha de vencimiento no es válida o ya expiró.';
          return `El valor del campo ${label} no es válido.`;
        },
        empty: () => `Completa el campo ${label}.`,
        required: () => `Completa el campo ${label}.`,
      };

      if (code && byCode[code]) return byCode[code]();

      if (fallbackMessage && !/undefined|operation_failed|validar la tarjeta/i.test(fallbackMessage)) {
        return fallbackMessage;
      }

      return `Revisa el campo ${label}.`;
    }

    function getFieldElement(field) {
      const id = FIELD_CONTAINER_ID[field];
      return id ? document.getElementById(id) : null;
    }

    function setFieldError(field, message) {
      const el = getFieldElement(field);
      const errorEl = document.getElementById(`error-${field}`);
      const group = el?.closest('.form-group');
      const label = group?.querySelector('label');

      if (el) el.classList.toggle('mp-field-invalid', Boolean(message));
      if (label) label.classList.toggle('label-invalid', Boolean(message));

      if (!errorEl) return;
      if (!message) {
        errorEl.textContent = '';
        errorEl.style.display = 'none';
        return;
      }
      errorEl.textContent = message;
      errorEl.style.display = 'block';
    }

    function clearAllFieldErrors() {
      Object.keys(FIELD_CONTAINER_ID).forEach((field) => setFieldError(field, null));
    }

    function applyFieldErrorsFromMp(error, field) {
      const items = normalizeMpErrors(error);
      if (!field) return items;

      if (items.length === 0) {
        setFieldError(field, null);
        return items;
      }

      const msg = items
        .map((e) => translateMpError(e.code, field, e.message))
        .filter(Boolean)
        .join(' ');

      setFieldError(field, msg);
      return items;
    }

    function guessFieldFromMessage(message) {
      const m = (message || '').toLowerCase();
      if (/cvv|security|seguridad|código/.test(m)) return 'securityCode';
      if (/expir|vencimiento|fecha/.test(m)) return 'expirationDate';
      if (/tarjeta|card|número|numero|bin/.test(m)) return 'cardNumber';
      if (/email|correo/.test(m)) return 'cardholderEmail';
      if (/nombre|holder|titular/.test(m)) return 'cardholderName';
      return null;
    }

    function validateNativeFields() {
      let valid = true;

      const name = document.getElementById('form-checkout__cardholderName').value.trim();
      if (!name) {
        setFieldError('cardholderName', 'Escribe el nombre tal como aparece en la tarjeta.');
        valid = false;
      } else {
        setFieldError('cardholderName', null);
      }

      const email = document.getElementById('form-checkout__cardholderEmail').value.trim();
      if (!email) {
        setFieldError('cardholderEmail', 'Ingresa el email del comprador.');
        valid = false;
      } else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
        setFieldError('cardholderEmail', 'El email no tiene un formato válido.');
        valid = false;
      } else {
        setFieldError('cardholderEmail', null);
      }

      return valid;
    }

    ['cardholderName', 'cardholderEmail'].forEach((field) => {
      const el = getFieldElement(field);
      el?.addEventListener('input', () => setFieldError(field, null));
      el?.addEventListener('blur', () => {
        if (field === 'cardholderName' && !el.value.trim()) {
          setFieldError(field, 'Escribe el nombre tal como aparece en la tarjeta.');
        }
        if (field === 'cardholderEmail') {
          const v = el.value.trim();
          if (!v) setFieldError(field, 'Ingresa el email del comprador.');
          else if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v)) {
            setFieldError(field, 'El email no tiene un formato válido.');
          }
        }
      });
    });

    const cardForm = mp.cardForm({
      amount: amountInput.value || '1', // MP requiere un valor inicial, se sobreescribe al submit
      iframe: true,
      form: {
        id: 'form-checkout',
        cardNumber:         { id: 'form-checkout__cardNumber',         placeholder: '0000 0000 0000 0000' },
        expirationDate:     { id: 'form-checkout__expirationDate',     placeholder: 'MM/YY' },
        securityCode:       { id: 'form-checkout__securityCode',       placeholder: 'CVV' },
        cardholderName:     { id: 'form-checkout__cardholderName' },
        cardholderEmail:    { id: 'form-checkout__cardholderEmail' },
        issuer:             { id: 'form-checkout__issuer' },
        installments:       { id: 'form-checkout__installments' },
      },
      callbacks: {
        onFormMounted: (error) => {
          if (error) return console.error('CardForm mount error:', error);
          console.log('✅ CardForm montado correctamente');
        },
        onReady: () => {
          console.log('✅ CardForm listo para recibir datos');
        },
        onBinChange: (bin) => {
          const prefix = String(bin || '').slice(0, 2);
          // Amex suele requerir CVV de 4 dígitos
          if (prefix === '34' || prefix === '37') expectedCvvLength = 4;
          else expectedCvvLength = 3;
        },
        onPaymentMethodsReceived: (error, data) => {
          if (error) return console.warn('paymentMethods error:', error);
          const settings = data?.results?.[0]?.settings?.[0];
          const cvvLen = settings?.security_code?.length;
          if (cvvLen) expectedCvvLength = cvvLen;
        },
        onValidityChange: (error, field) => {
          if (!field) return;
          applyFieldErrorsFromMp(error, field);
        },
        onError: (error) => {
          console.error('CardForm error:', error);
          const items = normalizeMpErrors(error);
          const field = error?.field;

          if (field) {
            applyFieldErrorsFromMp(error, field);
            return;
          }

          if (items.length) {
            items.forEach((item) => {
              const targetField =
                guessFieldFromMessage(item.message) || 'securityCode';
              setFieldError(
                targetField,
                translateMpError(item.code, targetField, item.message),
              );
            });
            return;
          }

          mostrarResultado({
            status: 'error',
            error: 'No se pudo validar la tarjeta. Revisa número, vencimiento y CVV.',
          });
        },
        onCardTokenReceived: (error) => {
          if (!error) return;
          console.error('Card token error:', error);
          const items = normalizeMpErrors(error);
          if (items.length) {
            setFieldError(
              'securityCode',
              translateMpError(items[0].code, 'securityCode', items[0].message),
            );
            return;
          }
          mostrarResultado({
            status: 'error',
            error: 'No se pudo generar el token de la tarjeta. Verifica los datos ingresados.',
          });
        },

        // 3. Al hacer submit MP tokeniza la tarjeta y llama este callback
        onSubmit: async (event) => {
          event.preventDefault();
          const btn = document.getElementById('form-checkout__submit');
          document.getElementById('result').style.display = 'none';

          // Tomar monto del input (viene de URL, no editable)
          const inputAmount = parseFloat(document.getElementById('payment-amount').value);
          if (!inputAmount || inputAmount <= 0) {
            alert('Monto inválido. Verifica la URL.');
            return;
          }

          const nativeOk = validateNativeFields();
          if (!nativeOk) return;

          btn.disabled = true;
          btn.textContent = 'Procesando...';

          const {
            token,
            paymentMethodId: payment_method_id,
            paymentMethodType: payment_method_type,
            cardholderEmail: email,
          } = cardForm.getCardFormData();

          try {
            if (!token) {
              const cvvMsg = expectedCvvLength === 4
                ? 'El CVV de American Express debe tener 4 dígitos.'
                : 'El CVV debe tener 3 dígitos.';
              setFieldError('cardNumber', 'Verifica el número de tarjeta.');
              setFieldError('expirationDate', 'Verifica la fecha de vencimiento (MM/AA).');
              setFieldError('securityCode', cvvMsg);
              mostrarResultado({
                status: 'error',
                error: 'Corrige los campos marcados en rojo antes de continuar.',
              });
              return;
            }
            const response = await fetch('https://servia.mx/pagos/api/payments', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              body: JSON.stringify({
                token,
                transaction_amount: inputAmount,
                payment_method_id,
                payment_method_type,
                description: 'Compra en Servia',
                external_reference: extRef,
                client_id: clientId,
                ...(idHistoryBalance !== null && { id_history_balance: idHistoryBalance }),
                payer: { email },
              }),
            });

            const data = await response.json();
            mostrarResultado(data);
          } catch (err) {
            mostrarResultado({ status: 'error', error: err.message });
          } finally {
            btn.disabled = false;
            btn.textContent = `Pagar $${inputAmount.toFixed(2)} MXN`;
            // El token es de un solo uso — resetear el form para generar uno nuevo
            cardForm.unmount();
            cardForm.mount();
          }
        },

        onFetching: (resource) => {
          // Puedes mostrar un spinner mientras MP carga datos (ej: cuotas)
          console.log('Fetching:', resource);
        },
      },
    });

    function mostrarResultado(data) {
      const el = document.getElementById('result');
      el.style.display = 'block';

      const mensajes = {
        processed:  '✅ Pago aprobado',
        failed:     '❌ Pago rechazado: ' + (data.payment_status_detail ?? ''),
        pending:    '⏳ Pago pendiente de acreditación',
        in_process: '⏳ Pago en revisión',
        error:      '⚠️ Error: ' + (data.error ?? data.message ?? 'Intenta de nuevo'),
      };

      el.className = data.status === 'processed' ? 'approved' : (data.status ?? 'error');
      el.innerHTML = `
        <strong>${mensajes[data.status] ?? 'Estado: ' + data.status}</strong>
        ${data.order_id ? `<br><small>Orden: ${data.order_id}</small>` : ''}
      `;

      // Enviar resultado a Flutter vía JavaScript channel
      if (window.FlutterChannel) {
        window.FlutterChannel.postMessage(JSON.stringify({
          order_id:             data.order_id,
          payment_id:           data.payment_id,
          status:               data.status,
          payment_status:       data.payment_status,
          payment_status_detail: data.payment_status_detail,
          total_amount:         data.total_amount,
          external_reference:   data.external_reference,
          user_id:              data.user_id,
        }));
      }
    }
  </script>
</body>
</html>
